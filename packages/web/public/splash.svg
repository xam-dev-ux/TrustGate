<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="200" height="200" fill="#050505"/>

  <!-- Simple loading icon - rotating square with accent -->
  <g transform="translate(100, 100)">
    <rect x="-40" y="-40" width="80" height="80" fill="none" stroke="#4ade80" stroke-width="4"/>
    <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#fafafa" stroke-width="2"/>

    <!-- Animated dot -->
    <circle cx="0" cy="-35" r="4" fill="#4ade80">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="2s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- TG monogram -->
  <text x="100" y="115" font-family="Impact, Arial Black, sans-serif" font-size="48" font-weight="900" fill="#fafafa" text-anchor="middle">
    TG
  </text>
</svg>
