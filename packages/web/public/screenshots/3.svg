  </text>

  <!-- Methodology Section -->
  <text x="100" y="1740" font-family="Impact, Arial Black, sans-serif" font-size="70" fill="#fafafa">
    METHODOLOGY
  </text>

  <!-- Methodology text -->
  <rect x="100" y="1800" width="1084" height="600" fill="#0f0f0f" stroke="#1f1f1f" stroke-width="2"/>

  <text x="140" y="1900" font-family="monospace" font-size="32" fill="#fafafa" font-weight="bold">
    Evaluation Accuracy:
  </text>
  <text x="140" y="1970" font-family="monospace" font-size="28" fill="#9ca3af">
