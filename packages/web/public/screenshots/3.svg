  </text>

  <text x="140" y="2130" font-family="monospace" font-size="32" fill="#fafafa" font-weight="bold">
    Certification Accuracy:
  </text>
  <text x="140" y="2200" font-family="monospace" font-size="28" fill="#9ca3af">
