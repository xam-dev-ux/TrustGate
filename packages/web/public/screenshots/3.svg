  </text>

  <!-- Subtitle -->
  <text x="100" y="420" font-family="monospace" font-size="32" fill="#6b7280">
    TRUSTGATE's verifiable track record
  </text>

  <!-- Evaluation Accuracy Card -->
  <rect x="100" y="520" width="1084" height="500" fill="#0f0f0f" stroke="#4ade80" stroke-width="3"/>
  <text x="140" y="620" font-family="Impact, Arial Black, sans-serif" font-size="60" fill="#fafafa">
    EVALUATION ACCURACY
  </text>
  <text x="642" y="820" font-family="Impact, Arial Black, sans-serif" font-size="200" fill="#4ade80" text-anchor="middle">
