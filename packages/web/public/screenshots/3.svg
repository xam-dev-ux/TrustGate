  </text>
  <text x="642" y="930" font-family="monospace" font-size="32" fill="#6b7280" text-anchor="middle">
    Based on 247 total evaluations
  </text>

  <!-- Certification Accuracy Card -->
  <rect x="100" y="1100" width="1084" height="500" fill="#0f0f0f" stroke="#4ade80" stroke-width="3"/>
  <text x="140" y="1200" font-family="Impact, Arial Black, sans-serif" font-size="60" fill="#fafafa">
